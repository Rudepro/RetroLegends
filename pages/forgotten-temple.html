<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Retro Legends - Forgotten Temple</title>
  <link rel="stylesheet" href="../assets/css/main.css"><link rel="stylesheet" href="../assets/css/game.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #2a1a0a 0%, #1a0a05 100%); padding: 1rem; }
    #gameCanvas { border: 3px solid #ffaa00; box-shadow: 0 0 30px rgba(255, 170, 0, 0.5); background: linear-gradient(135deg, #3a2a1a 0%, #1a0a05 100%); max-width: 100%; height: auto; image-rendering: pixelated; }
    .game-ui { width: 100%; max-width: 800px; padding: 1rem; background: rgba(5, 8, 18, 0.95); border: 2px solid #ffaa00; border-top: none; font-size: 1.1rem; display: flex; justify-content: space-around; }
    .game-stat { color: #ffaa00; font-weight: bold; }
    .game-controls { position: fixed; top: 1rem; right: 1rem; z-index: 1000; display: flex; gap: 1rem; }
    .pause-btn, .menu-btn { padding: 0.8rem 1.5rem; font-size: 1rem; background: rgba(255, 170, 0, 0.1); border: 2px solid #ffaa00; color: #ffaa00; cursor: pointer; font-family: 'Courier New', monospace; text-transform: uppercase; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 2000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--dark-bg); border: 3px solid #ffaa00; padding: 2rem; text-align: center; max-width: 400px; box-shadow: 0 0 40px #ffaa00; }
    .modal-title { font-size: 2.5rem; color: #ffaa00; margin-bottom: 1.5rem; }
    .modal-content { margin-bottom: 2rem; color: var(--text-secondary); line-height: 1.8; }
    .modal-buttons { display: flex; gap: 1rem; justify-content: center; }
    .modal-buttons .btn { flex: 1; }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="game-ui">
      <div><span class="game-stat-label">Puntos:</span> <span class="game-stat" id="score">0</span></div>
      <div><span class="game-stat-label">Reliquias:</span> <span class="game-stat" id="relics">0</span></div>
      <div><span class="game-stat-label">Vidas:</span> <span class="game-stat" id="lives">3</span></div>
    </div>
  </div>
  <div class="game-controls">
    <button class="pause-btn" id="pauseBtn">⏸ Pausa</button>
    <button class="menu-btn" id="menuBtn">🏠 Menú</button>
  </div>
  <div class="modal-overlay active" id="mainMenu">
    <div class="modal-box">
      <div class="modal-title">🏛️ FORGOTTEN TEMPLE</div>
      <div class="modal-content"><p>Explora un templo antiguo lleno de rompecabezas, trampas y secretos legendarios.</p></div>
      <div class="modal-buttons">
        <button class="btn" onclick="startGame()">🎮 Jugar</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 Atrás</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="pauseMenu">
    <div class="modal-box">
      <div class="modal-title">⏸ PAUSA</div>
      <div class="modal-buttons">
        <button class="btn" onclick="resumeGame()">▶ Reanudar</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 Menú</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="gameOverMenu">
    <div class="modal-box">
      <div class="modal-title">💀 GAME OVER</div>
      <div class="modal-content"><p>Puntos: <span id="finalScore">0</span></p></div>
      <div class="modal-buttons">
        <button class="btn" onclick="startGame()">🔄 Reintentar</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 Menú</button>
      </div>
    </div>
  </div>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/audio.js"></script>
  <script src="../assets/js/particles.js"></script>
  <script src="../assets/js/effects.js"></script>
  <script src="../assets/js/game-manager.js"></script>
  <script src="../games/forgotten-temple/js/forgotten-temple.js"></script>
</body>
</html>
